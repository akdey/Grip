name: Lifestyle & Inactivity Insights

on:
  schedule:
    # Runs at 4:30 AM UTC (10:00 AM IST) daily
    - cron: '30 4 * * *'
  workflow_dispatch: # Allows manual trigger anytime (Forces Friday Weekend Logic if manual)

jobs:
  run-lifestyle:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          cd Backend
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run Lifestyle Engine
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          FROM_NAME: ${{ secrets.FROM_NAME }}
          FRONTEND_ORIGIN: ${{ secrets.FRONTEND_ORIGIN }}
          GRIP_HF_URL: ${{ secrets.GRIP_HF_URL }}
          X_GRIP_HF_LLM_TOKEN: ${{ secrets.X_GRIP_HF_LLM_TOKEN }}
          EMAIL_RELAY_URL: ${{ secrets.EMAIL_RELAY_URL }}
          EMAIL_RELAY_SECRET: ${{ secrets.EMAIL_RELAY_SECRET }}
          GRIP_SECRET: ${{ secrets.GRIP_SECRET }}
          ENVIRONMENT: production
        run: |
          cd Backend
          python -c "
          import asyncio
          import os
          import time
          import httpx

          # --- Remote LLM Patch ---
          from app.core import llm as llm_module

          _hf_base = os.environ.get('GRIP_HF_URL', '').rstrip('/')
          _grip_secret = os.environ.get('GRIP_SECRET', '')
          _generate_url = f'{_hf_base}/api/v1/internal/generate'

          async def _prewarm_hf_space():
              print(f'Pre-warming HF Space at {_hf_base}...')
              for i in range(5):
                  try:
                      async with httpx.AsyncClient() as client:
                          resp = await client.get(_hf_base, timeout=10.0)
                          if resp.status_code == 200:
                              print('HF Space is awake and active!')
                              return True
                  except Exception:
                      pass
                  print(f'Space is warming up/sleeping, waiting 30 seconds... (Attempt {i+1}/5)')
                  await asyncio.sleep(30)
              return False

          class _RemoteLLMService:
              @property
              def is_enabled(self):
                  return bool(_hf_base and _grip_secret)

              async def generate_response(self, prompt, system_prompt=None, temperature=0.5, **kwargs):
                  if not self.is_enabled:
                      return None
                  
                  await _prewarm_hf_space()

                  try:
                      async with httpx.AsyncClient() as client:
                          resp = await client.post(
                              _generate_url,
                              json={
                                  'prompt': prompt,
                                  'system_prompt': system_prompt or 'You are a helpful financial assistant.',
                                  'temperature': temperature
                              },
                              headers={'X-Grip-Secret': _grip_secret},
                              timeout=180.0
                          )
                          if resp.status_code == 200:
                              return resp.json().get('result')
                          print(f'Remote LLM returned {resp.status_code}: {resp.text[:200]}')
                  except Exception as e:
                      import traceback
                      print(f'Remote LLM call failed: {e}')
                      traceback.print_exc()
                  return None

              async def generate_json(self, prompt, **kwargs):
                  return None

          llm_module._llm_service = _RemoteLLMService()
          print(f'Remote LLM patched. Endpoint: {_generate_url}. Enabled: {llm_module._llm_service.is_enabled}')
          # --- End Patch ---

          from app.core.scheduler import run_lifestyle_insights
          from datetime import date, timedelta
          
          async def main():
              is_manual = os.getenv('GITHUB_EVENT_NAME') == 'workflow_dispatch'
              override = None
              
              if is_manual:
                  # Manual trigger usually means testing. Force assume today is a Friday
                  # so we can see the AI Weekend Insight in action.
                  print('Manual trigger detected. Simulating Friday for Weekend Insights...')
                  today = date.today()
                  days_to_friday = (4 - today.weekday()) % 7
                  override = today + timedelta(days=days_to_friday)
              
              await run_lifestyle_insights(override_date=override)
              print('Lifestyle insights finished.')
          
          asyncio.run(main())
          "
