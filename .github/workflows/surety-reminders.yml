name: Surety Bill Reminders

on:
  schedule:
    # Runs at 1:30 AM UTC (7:00 AM IST) daily
    - cron: '30 1 * * *'
  workflow_dispatch: # Allows manual trigger anytime

jobs:
  run-reminders:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          cd Backend
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Cache LLM Model
        id: cache-model
        uses: actions/cache@v4
        with:
          path: Backend/models
          key: ${{ runner.os }}-llm-model-gemma-4-v1

      - name: Download LLM Model
        if: steps.cache-model.outputs.cache-hit != 'true'
        env:
          HF_TOKEN: ${{ secrets.X_GRIP_HF_LLM_TOKEN }}
        run: |
          mkdir -p Backend/models
          huggingface-cli download bartowski/google_gemma-4-E4B-it-GGUF google_gemma-4-E4B-it-Q4_K_M.gguf --local-dir Backend/models
      
      - name: Run Reminders
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          FROM_NAME: ${{ secrets.FROM_NAME }}
          FRONTEND_ORIGIN: ${{ secrets.FRONTEND_ORIGIN }}
          GRIP_HF_LLM_URL: ${{ secrets.GRIP_HF_LLM_URL }}
          X_GRIP_HF_LLM_TOKEN: ${{ secrets.X_GRIP_HF_LLM_TOKEN }}
          HF_TOKEN: ${{ secrets.X_GRIP_HF_LLM_TOKEN }}
          EMAIL_RELAY_URL: ${{ secrets.EMAIL_RELAY_URL }}
          EMAIL_RELAY_SECRET: ${{ secrets.EMAIL_RELAY_SECRET }}
          ENVIRONMENT: production
        run: |
          cd Backend
          python -c "
          import asyncio
          from app.core.scheduler import run_surety_reminders
          
          async def main():
              print('Starting Surety Bill Reminders Scan...')
              await run_surety_reminders()
              print('Reminders scan finished.')
          
          asyncio.run(main())
          "
